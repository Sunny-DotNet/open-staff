<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Bold white hub-and-spoke: center orchestrator + 3 agent nodes -->
  <!-- Thick connection lines -->
  <g stroke="#fff" stroke-width="28" stroke-linecap="round" opacity="0.6">
    <line x1="256" y1="256" x2="256" y2="112"/>
    <line x1="256" y1="256" x2="132" y2="344"/>
    <line x1="256" y1="256" x2="380" y2="344"/>
  </g>

  <!-- Center hub (orchestrator) -->
  <circle cx="256" cy="256" r="56" fill="#fff"/>

  <!-- Top agent -->
  <circle cx="256" cy="112" r="44" fill="#fff"/>
  <!-- Bottom-left agent -->
  <circle cx="132" cy="344" r="44" fill="#fff"/>
  <!-- Bottom-right agent -->
  <circle cx="380" cy="344" r="44" fill="#fff"/>
</svg>
