# ============================================================
# OpenStaff Docker Compose — 一键部署
# 使用: docker compose up -d
# ============================================================
version: '3.8'

services:
  # ---- PostgreSQL 数据库 ----
  postgres:
    image: postgres:16-alpine
    container_name: openstaff-db
    environment:
      POSTGRES_DB: openstaff
      POSTGRES_USER: openstaff
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openstaff"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- .NET 后端 API ----
  api:
    build:
      context: ./src
      dockerfile: OpenStaff.Api/Dockerfile
    container_name: openstaff-api
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=openstaff;Username=openstaff;Password=${DB_PASSWORD}
      - ASPNETCORE_URLS=http://+:5000
      - ASPNETCORE_ENVIRONMENT=Production
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - workspaces:/app/workspaces
      - plugins:/app/plugins

  # ---- Vue 前端 ----
  web:
    build:
      context: ./web
    container_name: openstaff-web
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
  workspaces:
  plugins:
